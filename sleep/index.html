<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>睡眠深度分析 · 找到属于你的安眠方式</title>
<style>
:root {
  --bg: #0a0e17; --card: rgba(255,255,255,0.035);
  --text: #c8d0dc; --sub: #7e8aa0;
  --moon: #b8c8e8; --moon-glow: #8898c0;
  --lavender: #9b8ec4; --teal: #6db3a0;
  --warm: #d4a574; --gold: #c9a96e;
  --radius: 18px; --radius-sm: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden; line-height: 1.7;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}
.bg-night {
  position: fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 60% 30% at 50% 15%, rgba(155,142,196,.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 20% 70%, rgba(109,179,160,.05) 0%, transparent 55%),
    radial-gradient(ellipse 40% 50% at 80% 40%, rgba(184,200,232,.04) 0%, transparent 60%);
}
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.star {
  position:absolute; border-radius:50%; background:var(--moon);
  animation: twinkle var(--d) ease-in-out infinite;
  animation-delay: var(--delay); opacity:0;
}
@keyframes twinkle {
  0%,100% { opacity:0.06; transform:scale(1); }
  50% { opacity:0.3; transform:scale(1.5); }
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes breathe {
  0%,100% { transform:scale(1); opacity:0.6; }
  50% { transform:scale(1.08); opacity:1; }
}
@keyframes confetti-fall {
  0% { transform:translateY(-10vh) rotate(0deg); opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}
@keyframes fillBar {
  from { width:0; }
  to { width:var(--w); }
}

.container {
  position:relative; z-index:1;
  max-width:460px; margin:0 auto; padding:24px 18px 48px;
  min-height:100vh; display:flex; flex-direction:column;
}
.screen { display:none; flex-direction:column; flex:1; }
.screen.active { display:flex; animation:slideUp .5s ease; }

.welcome { align-items:center; justify-content:center; text-align:center; gap:24px; }
.welcome .moon { font-size:60px; animation:breathe 4s ease-in-out infinite; }
.welcome h1 {
  font-size:26px; font-weight:600; letter-spacing:1px;
  color: var(--moon); line-height:1.5;
}
.welcome .divider { width:36px; height:1px; background:linear-gradient(90deg,transparent,var(--moon-glow),transparent); }
.welcome p { color:var(--sub); font-size:14px; max-width:290px; line-height:1.8; }

.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:13px 30px; border-radius:40px; border:none;
  font-size:15px; font-weight:500; cursor:pointer;
  transition:all .3s; letter-spacing:1px;
  -webkit-tap-highlight-color:transparent;
}
.btn-primary {
  background: linear-gradient(135deg, var(--lavender), var(--moon-glow));
  color: var(--bg); width:100%; max-width:280px;
}
.btn-primary:active { transform:scale(.96); }
.btn-secondary {
  background: rgba(255,255,255,.04); color:var(--text);
  border:1px solid rgba(255,255,255,.08); width:100%; max-width:280px;
}
.btn-secondary:active { background: rgba(255,255,255,.08); }
.btn-sm {
  padding:10px 20px; font-size:13px; border-radius:24px;
  background: rgba(255,255,255,.04); color:var(--text);
  border:1px solid rgba(255,255,255,.07); cursor:pointer;
}
.btn-sm:active { background: rgba(255,255,255,.08); }

.card {
  background:var(--card); border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.05);
  padding:20px; backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}

.progress-bar {
  width:100%; height:3px; background:rgba(255,255,255,.05);
  border-radius:2px; overflow:hidden; margin-bottom:24px;
}
.progress-fill {
  height:100%; border-radius:2px;
  background: linear-gradient(90deg, var(--moon-glow), var(--lavender));
  transition: width .4s ease;
}

.quiz-header { text-align:center; margin-bottom:24px; }
.quiz-header .q-num { color:var(--moon-glow); font-size:11px; letter-spacing:2px; }
.question-text {
  font-size:18px; font-weight:500; text-align:center; margin-bottom:24px;
  line-height:1.6; color:var(--text);
}
.option {
  display:flex; align-items:center; gap:12px; padding:15px 16px;
  background:var(--card); border-radius:var(--radius-sm);
  border:1px solid rgba(255,255,255,.04); cursor:pointer;
  transition:all .25s; margin-bottom:10px;
}
.option:active { transform:scale(.98); }
.option.selected {
  border-color:var(--moon-glow);
  background:rgba(136,152,192,.08);
}
.option .opt-check {
  width:20px; height:20px; border-radius:50%; flex-shrink:0;
  border:1.5px solid rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center;
  font-size:11px; transition:all .25s; color:transparent;
}
.option.selected .opt-check {
  border-color:var(--moon-glow); background:var(--moon-glow); color:var(--bg);
}
.option .opt-text { font-size:14px; line-height:1.5; flex:1; }

.input-group { margin-bottom:20px; }
.input-group label { display:block; font-size:13px; margin-bottom:8px; color:var(--sub); }
.input-group input {
  width:100%; padding:13px 16px; border-radius:var(--radius-sm);
  background:var(--card); border:1px solid rgba(255,255,255,.07);
  color:var(--text); font-size:16px; outline:none; font-family:inherit;
  transition:border-color .3s;
}
.input-group input:focus { border-color:var(--moon-glow); }
.input-group input::placeholder { color:rgba(255,255,255,.12); }

.share-screen { align-items:center; justify-content:center; text-align:center; gap:18px; }
.share-screen .share-icon { font-size:44px; opacity:0.75; }
.share-screen h2 { font-size:21px; font-weight:500; color:var(--moon); }
.share-screen p { color:var(--sub); font-size:13px; line-height:1.8; }
.share-link-box {
  width:100%; padding:14px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,.025); border:1px dashed rgba(255,255,255,.08);
  word-break:break-all; font-size:11px; color:var(--sub); text-align:left;
  max-height:76px; overflow-y:auto; user-select:text; -webkit-user-select:text;
}
.qr-wrapper { background:#eef1f5; padding:12px; border-radius:14px; display:inline-block; }
.qr-wrapper canvas { display:block; }
.qr-hint { font-size:11px; color:var(--sub); margin-top:8px; }

.results-screen { gap:20px; align-items:center; padding-top:8px; }
.results-screen .result-header { text-align:center; }
.result-header .name { font-size:18px; font-weight:500; color:var(--moon); }

.profile-card {
  background:var(--card); border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.06); padding:20px;
  width:100%; text-align:center;
}
.profile-card .profile-type {
  font-size:28px; margin-bottom:4px;
}
.profile-card .profile-name {
  font-size:20px; font-weight:600; color:var(--moon);
  letter-spacing:1px; margin-bottom:10px;
}
.profile-card .profile-desc {
  font-size:13px; color:var(--sub); line-height:1.8;
}

.dimensions { width:100%; display:flex; flex-direction:column; gap:8px; }
.dim-item { display:flex; flex-direction:column; gap:4px; }
.dim-header { display:flex; justify-content:space-between; font-size:12px; }
.dim-header .dim-name { color:var(--sub); }
.dim-header .dim-label { font-weight:500; }
.dim-bar-bg { height:5px; border-radius:3px; background:rgba(255,255,255,.05); overflow:hidden; }
.dim-bar-fill { height:100%; border-radius:3px; transition:width 1.2s ease .3s; }
.dim-bar-fill.d1 { background: linear-gradient(90deg, var(--lavender), var(--moon-glow)); }
.dim-bar-fill.d2 { background: linear-gradient(90deg, var(--teal), #8ec4b4); }
.dim-bar-fill.d3 { background: linear-gradient(90deg, var(--warm), var(--gold)); }
.dim-bar-fill.d4 { background: linear-gradient(90deg, #a0a8c0, #c0c8e0); }
.dim-bar-fill.d5 { background: linear-gradient(90deg, #c48080, #d4a0a0); }

.advice-section { width:100%; display:flex; flex-direction:column; gap:12px; }
.advice-card {
  background:var(--card); border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.05); padding:18px;
}
.advice-card .advice-icon { font-size:28px; margin-bottom:6px; }
.advice-card h4 { font-size:14px; font-weight:600; margin-bottom:6px; color:var(--moon); }
.advice-card p { font-size:12px; color:var(--sub); line-height:1.8; }

.confetti-container { position:fixed; inset:0; pointer-events:none; z-index:10; overflow:hidden; }
.confetti-piece {
  position:absolute; top:-10px; width:6px; height:6px; border-radius:50%;
  animation: confetti-fall var(--cd) linear forwards;
  animation-delay: var(--cdelay);
}

.toast {
  position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
  padding:11px 24px; border-radius:40px; background:rgba(0,0,0,.88);
  color:var(--moon); font-size:13px; z-index:100; animation:slideUp .3s ease;
  pointer-events:none; white-space:nowrap;
}

@media (max-width:380px) {
  .welcome h1 { font-size:22px; }
  .question-text { font-size:16px; }
}
</style>
</head>
<body>
<div class="bg-night"></div>
<div class="stars" id="stars"></div>

<div class="container" id="app">
  <div class="screen welcome active" id="screen-welcome">
    <div class="moon">🌙</div>
    <h1>你的睡眠<br>值得被认真对待</h1>
    <div class="divider"></div>
    <p>12 道深度评估题，帮你找到睡不好的真正原因，并给出科学、可执行的改善方案</p>
    <button class="btn btn-primary" onclick="startQuiz()">开始评估</button>
  </div>

  <div class="screen" id="screen-quiz">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="quiz-header"><div class="q-num" id="q-num"></div></div>
    <div id="name-section" class="card" style="text-align:center;">
      <p style="font-size:15px;color:var(--moon);">你的称呼</p>
      <div class="input-group" style="margin-top:12px;">
        <input type="text" id="name" placeholder="怎么称呼你？" maxlength="8" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="confirmName()" style="margin-top:6px;">开始答题</button>
    </div>
    <div id="quiz-section" style="display:none;flex:1;flex-direction:column;">
      <p class="question-text" id="question-text"></p>
      <div id="options-container"></div>
      <div style="margin-top:auto;display:flex;gap:10px;padding-top:20px;">
        <button class="btn btn-secondary btn-sm" id="btn-prev" style="display:none;" onclick="prevQ()">← 上一题</button>
        <button class="btn btn-primary btn-sm" id="btn-next" onclick="nextQ()" style="flex:1;">下一题 →</button>
      </div>
    </div>
  </div>

  <div class="screen share-screen" id="screen-share">
    <div class="share-icon">📤</div>
    <h2>你的睡眠分析已生成</h2>
    <p>把链接发给关心你睡眠的人<br>或者保存下来提醒自己</p>
    <div id="qr-container"></div>
    <div class="share-link-box" id="share-link" style="margin-top:8px;"></div>
    <button class="btn btn-primary" onclick="copyLink()">📋 复制链接</button>
    <button class="btn btn-secondary" onclick="resetAll()">重新评估</button>
  </div>

  <div class="screen results-screen" id="screen-results">
    <div class="result-header">
      <div class="name" id="r-name"></div>
    </div>
    <div class="profile-card" id="profile-card"></div>
    <div class="dimensions" id="dimensions"></div>
    <div class="advice-section" id="advice-section"></div>
    <button class="btn btn-primary" onclick="resetAll()" style="margin-top:6px;">重新评估</button>
    <button class="btn btn-secondary btn-sm" onclick="shareResult()">分享结果</button>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
var questions=[
  { text:"入睡一般需要多长时间？", options:[
    { text:"躺下就睡着（< 10 分钟）", dim:"circadian", score:1 },
    { text:"需要 15～30 分钟", dim:"circadian", score:2 },
    { text:"要 30 分钟到 1 小时", dim:"circadian", score:3 },
    { text:"常常翻来覆去超过 1 小时", dim:"circadian", score:4 }
  ]},
  { text:"睡觉时对什么最敏感？", options:[
    { text:"声音——一点动静就醒", dim:"sensory", score:4 },
    { text:"光线——有光就睡不踏实", dim:"sensory", score:3 },
    { text:"温度——热了冷了都不行", dim:"sensory", score:2 },
    { text:"还好，不太挑环境", dim:"sensory", score:1 }
  ]},
  { text:"睡前 1 小时你通常在做什么？", options:[
    { text:"看手机 / 刷短视频 / 回消息", dim:"arousal", score:4 },
    { text:"脑子里反复想事情，停不下来", dim:"arousal", score:4 },
    { text:"看书、听播客或轻度活动", dim:"arousal", score:2 },
    { text:"基本能放松，不怎么接触屏幕", dim:"arousal", score:1 }
  ]},
  { text:"感觉'脑子停不下来'的程度？", options:[
    { text:"几乎每晚都在不停想事情", dim:"arousal", score:4 },
    { text:"经常这样，一周有三四天", dim:"arousal", score:3 },
    { text:"偶尔压力大的时候会", dim:"arousal", score:2 },
    { text:"还好，上床后能比较快放松", dim:"arousal", score:1 }
  ]},
  { text:"做梦的情况？", options:[
    { text:"每天都做，醒来记得很清楚", dim:"deep", score:4 },
    { text:"经常做梦，但细节记不太清", dim:"deep", score:3 },
    { text:"偶尔做梦", dim:"deep", score:2 },
    { text:"几乎不记得做过梦", dim:"deep", score:1 }
  ]},
  { text:"半夜醒来的频率？", options:[
    { text:"几乎每晚都会醒，有时不止一次", dim:"sensory", score:4 },
    { text:"一周有 3～4 天会醒来", dim:"sensory", score:3 },
    { text:"偶尔醒，比如被吵到或想上洗手间", dim:"sensory", score:2 },
    { text:"很少，基本一觉到天亮", dim:"sensory", score:1 }
  ]},
  { text:"白天的精神状态？", options:[
    { text:"很累，总觉得没睡够，需要咖啡撑着", dim:"lifestyle", score:4 },
    { text:"早上最困，到下午会好转", dim:"lifestyle", score:3 },
    { text:"身体有点累，但脑子还是清醒的", dim:"lifestyle", score:2 },
    { text:"还行，虽然睡得一般但习惯了", dim:"lifestyle", score:1 }
  ]},
  { text:"周末或休息日会补觉吗？", options:[
    { text:"会，睡到自然醒，比平时多好几个小时", dim:"circadian", score:4 },
    { text:"会多睡一会儿，但不会太离谱", dim:"circadian", score:3 },
    { text:"尽量保持和平时差不多的起床时间", dim:"circadian", score:1 },
    { text:"想补觉但睡不着或者醒得更早", dim:"circadian", score:4 }
  ]},
  { text:"运动习惯？", options:[
    { text:"几乎不运动", dim:"lifestyle", score:4 },
    { text:"偶尔散步或很轻的活动", dim:"lifestyle", score:3 },
    { text:"每周规律运动 2～3 次", dim:"lifestyle", score:2 },
    { text:"几乎每天都有运动", dim:"lifestyle", score:1 }
  ]},
  { text:"睡前 2 小时的饮食？", options:[
    { text:"会吃东西或喝含咖啡因的饮料", dim:"lifestyle", score:4 },
    { text:"晚餐吃得晚或很饱", dim:"lifestyle", score:3 },
    { text:"偶尔喝点酒助眠", dim:"lifestyle", score:3 },
    { text:"基本不吃不喝（除了水）", dim:"lifestyle", score:1 }
  ]},
  { text:"早上醒来后的第一感觉？", options:[
    { text:"像没睡一样，甚至更累了", dim:"deep", score:4 },
    { text:"身体醒了，脑子还晕着的", dim:"deep", score:3 },
    { text:"睡醒脑子已经开始转、开始想事情了", dim:"arousal", score:3 },
    { text:"还行，能正常开始一天", dim:"deep", score:1 }
  ]},
  { text:"对自己睡眠最想改善的是什么？", options:[
    { text:"减少中途醒来，睡一个整觉", dim:"sensory", score:4 },
    { text:"让脑子安静下来，睡前不要再想事情", dim:"arousal", score:4 },
    { text:"延长总睡眠时间", dim:"circadian", score:3 },
    { text:"提高睡眠质量，醒来真正有精神", dim:"deep", score:4 }
  ]}
];

var dimNames={sensory:"感官敏感度",arousal:"大脑活跃度",circadian:"节律稳定性",deep:"深度睡眠",lifestyle:"生活习惯"};
var dimColors={sensory:"d1",arousal:"d2",circadian:"d3",deep:"d4",lifestyle:"d5"};

var name="", answers=[], currentQ=0;

function base64urlEncode(s){return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");}
function base64urlDecode(s){s=s.replace(/-/g,"+").replace(/_/g,"/");while(s.length%4)s+="=";return decodeURIComponent(escape(atob(s)));}

function init(){createStars();}

function createStars(){
  var c=document.getElementById("stars");
  for(var i=0;i<35;i++){
    var s=document.createElement("div");s.className="star";
    s.style.cssText="left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;width:"+(1+Math.random()*2)+"px;height:"+(1+Math.random()*2)+"px;--d:"+(3+Math.random()*5)+"s;--delay:"+Math.random()*6+"s";
    c.appendChild(s);
  }
}

function switchScreen(id){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  document.getElementById(id).classList.add("active");window.scrollTo(0,0);
}

function startQuiz(){
  answers=new Array(12).fill(-1);currentQ=0;
  switchScreen("screen-quiz");
  document.getElementById("name-section").style.display="block";
  document.getElementById("quiz-section").style.display="none";
  document.getElementById("name").value="";
  setTimeout(function(){document.getElementById("name").focus();},300);
}
function confirmName(){
  var n=document.getElementById("name").value.trim();
  if(!n){document.getElementById("name").focus();return;}
  name=n;
  document.getElementById("name-section").style.display="none";
  document.getElementById("quiz-section").style.display="flex";
  renderQ(0);
}
function renderQ(idx){
  currentQ=idx;var q=questions[idx];
  document.getElementById("q-num").textContent="第 "+(idx+1)+" / 12 题";
  document.getElementById("question-text").textContent=q.text;
  document.getElementById("progress-fill").style.width=(idx/12*100)+"%";
  var c=document.getElementById("options-container");c.innerHTML="";
  q.options.forEach(function(o,i){
    var d=document.createElement("div");
    d.className="option"+(answers[idx]===i?" selected":"");
    d.innerHTML='<span class="opt-check">'+(answers[idx]===i?"\u2713":"")+'</span><span class="opt-text">'+o.text+'</span>';
    d.onclick=(function(qi,oi){return function(){selectQ(qi,oi);};})(idx,i);
    c.appendChild(d);
  });
  document.getElementById("btn-prev").style.display=idx>0?"inline-flex":"none";
  var b=document.getElementById("btn-next");
  b.textContent=idx===11?"\uD83C\uDF19 查看分析报告":"下一题 \u2192";
  var ok=answers[idx]>=0;b.style.opacity=ok?"1":"0.4";b.style.pointerEvents=ok?"auto":"none";
}
function selectQ(qi,oi){answers[qi]=oi;renderQ(qi);}
function nextQ(){if(answers[currentQ]<0)return;if(currentQ<11)renderQ(currentQ+1);else finish();}
function prevQ(){if(currentQ>0)renderQ(currentQ-1);}

function finish(){
  var l=location.origin+location.pathname+"?d="+base64urlEncode(JSON.stringify({n:name,a:answers}));
  document.getElementById("share-link").textContent=l;
  switchScreen("screen-share");
  genQR(l);
  showResults();
}
function genQR(url){
  var c=document.getElementById("qr-container");if(!c)return;
  c.innerHTML='<div class="qr-wrapper"><canvas id="qr-canvas"></canvas></div><div class="qr-hint">扫码查看你的睡眠分析</div>';
  var cv=document.getElementById("qr-canvas");
  var img=new Image();img.crossOrigin="anonymous";
  img.onload=function(){var s=Math.min(180,innerWidth-80);cv.width=s;cv.height=s;var ctx=cv.getContext("2d");ctx.fillStyle="#eef1f5";ctx.fillRect(0,0,s,s);ctx.drawImage(img,0,0,s,s);};
  img.onerror=function(){c.innerHTML="";};
  img.src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(url);
}
function copyLink(){
  var l=document.getElementById("share-link").textContent;
  if(navigator.share){navigator.share({title:"睡眠分析",text:name+"的睡眠深度分析",url:l}).catch(function(){fbCopy(l);});return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(l).then(function(){toast("已复制链接");}).catch(function(){fbCopy(l);});return;}
  fbCopy(l);
}
function fbCopy(t){
  var ta=document.createElement("textarea");ta.value=t;
  ta.style.position="fixed";ta.style.left="-9999px";ta.style.opacity="0";
  document.body.appendChild(ta);ta.focus();ta.select();
  try{var ok=document.execCommand("copy");toast(ok?"已复制链接":"请长按链接手动复制");}catch(e){toast("请长按链接手动复制");}
  document.body.removeChild(ta);
}

// Parse URL on load
(function(){
  var raw="",qp=new URLSearchParams(location.search);raw=qp.get("d")||"";if(!raw)raw=location.hash.slice(1);
  if(raw){try{var d=JSON.parse(base64urlDecode(raw));if(d.n&&d.a&&d.a.length===12){name=d.n;answers=d.a;document.getElementById("r-name").textContent=name;switchScreen("screen-results");showResults();}}catch(e){}}
})();

function showResults(){
  document.getElementById("r-name").textContent=name;

  // Calc dimension scores (higher = worse)
  var scores={},maxScores={};
  for(var d in dimNames){scores[d]=0;maxScores[d]=0;}
  for(var i=0;i<12;i++){
    if(answers[i]<0)continue;
    var q=questions[i],o=q.options[answers[i]];
    scores[o.dim]+=o.score;
    for(var j=0;j<q.options.length;j++){if(q.options[j].dim===o.dim)maxScores[o.dim]=Math.max(maxScores[o.dim],q.options[j].score);}
  }
  // Normalize to max possible per dim
  var dimCount={sensory:3,arousal:4,circadian:3,deep:3,lifestyle:3};
  var dimPct={};
  for(var d in scores){dimPct[d]=Math.round((scores[d]/(dimCount[d]*4))*100);}

  // Determine profile type
  var sorted=Object.keys(dimPct).sort(function(a,b){return dimPct[b]-dimPct[a];});
  var top=sorted[0],top2=sorted[1];
  var profile=getProfile(top,top2,dimPct);

  // Profile card
  document.getElementById("profile-card").innerHTML='<div class="profile-type">'+profile.icon+'</div><div class="profile-name">'+profile.name+'</div><div class="profile-desc">'+profile.desc+'</div>';

  // Dimensions
  var dc=document.getElementById("dimensions");dc.innerHTML='';
  var ddLabels={sensory:"听觉/环境越敏感越容易醒",arousal:"思维越活跃越难放松入睡",circadian:"作息越乱睡眠越不稳定",deep:"越难进入深睡越容易累",lifestyle:"习惯越不利于睡眠"};
  for(var d in dimPct){
    var s=dimPct[d],label="";
    if(s>=75)label="需重点改善";
    else if(s>=50)label="中等关注";
    else if(s>=25)label="轻度影响";
    else label="表现良好";
    var item=document.createElement("div");item.className="dim-item";
    item.innerHTML='<div class="dim-header"><span class="dim-name">'+dimNames[d]+'<span style="font-size:10px;color:var(--sub);margin-left:4px;">'+ddLabels[d]+'</span></span><span class="dim-label">'+label+'</span></div><div class="dim-bar-bg"><div class="dim-bar-fill '+dimColors[d]+'" style="width:'+s+'%"></div></div>';
    dc.appendChild(item);
  }

  // Advice
  var advices=getAdvices(dimPct);
  var ac=document.getElementById("advice-section");ac.innerHTML='';
  advices.forEach(function(a){
    var d=document.createElement("div");d.className="advice-card";
    d.innerHTML='<div class="advice-icon">'+a.icon+'</div><h4>'+a.title+'</h4><p>'+a.text+'</p>';
    ac.appendChild(d);
  });

  // Confetti for the gesture of caring
  spawnConfetti(20);
}

function getProfile(top,top2,scores){
  if(scores["sensory"]>=70&&scores["arousal"]>=60)return {icon:"\uD83E\uDDD0",name:"高敏觉醒型",desc:"你的神经系统天生敏锐——浅眠、易醒、做梦清晰，都属于高感官敏感度的表现。这不是毛病，是你的出厂设定。同时你的大脑也很活跃，入睡前思维停不下来。这两种特质叠加，让你的睡眠特别容易被干扰。"};
  if(scores["arousal"]>=70)return {icon:"\uD83E\uDDE0",name:"大脑过载型",desc:"你的核心问题是睡前大脑无法安静。白天的思绪一直在后台运行，到了晚上反而加速——这是典型的'认知过度唤醒'。你的睡眠问题不是身体不累，而是大脑不知道如何下班。"};
  if(scores["sensory"]>=65)return {icon:"\uD83D\uDC42",name:"天生浅眠型",desc:"你从小就是浅眠体质，对声音、光线、温度都异常敏感。你的睡眠很轻不是因为焦虑，而是你的神经系统天生就是'高警觉模式'。好消息是：这种体质可以通过环境优化和对策大幅改善。"};
  if(scores["deep"]>=60)return {icon:"\uD83C\uDF19",name:"深睡不足型",desc:"你的主要问题是深度睡眠和REM睡眠的平衡被打乱了。每天做梦且记得清楚，说明你在REM期频繁醒来。这意味着你的睡眠长期处于'浅层'状态，缺少修复身体和大脑的深度睡眠。"};
  if(scores["circadian"]>=60)return {icon:"\u23F0",name:"节律失调型",desc:"你的作息不太稳定，周末补觉反而打乱了生物钟。入睡时间和起床时间波动过大，让身体始终不知道什么时候该睡、什么时候该醒。"};
  if(scores["lifestyle"]>=60)return {icon:"\uD83C\uDF43",name:"习惯干扰型",desc:"你的睡眠问题更多来自生活习惯——咖啡因摄入、缺乏运动、睡前饮食等。这些问题一旦调整，睡眠质量往往能快速改善。"};
  return {icon:"\u2728",name:"混合干扰型",desc:"你的睡眠受到多种因素的综合影响。没有单一的原因，而是多个小因素叠加在一起，让睡眠变得不稳定。好消息是：每改善一个因素，睡眠就会好一点。"};
}

function getAdvices(scores){
  var a=[];
  var st=Object.keys(scores).sort(function(x,y){return scores[y]-scores[x];});
  // Always give 4 pieces of advice based on top issues
  var topIssues=st.slice(0,4);
  topIssues.forEach(function(d){
    var s=scores[d];
    if(s<20)return; // skip if not really an issue
    switch(d){
      case "sensory": a.push({icon:"\uD83C\uDF19",title:"打造完美的睡眠环境",
        text:"<b>白噪音</b>：用白噪音机或App播放雨声/风扇声，盖住突然的声响。这是浅眠者最有效的对策。<br><b>遮光窗帘+眼罩</b>：确保房间完全黑暗，哪怕一丝光都会干扰浅眠者。<br><b>耳塞</b>：如果对声音特别敏感，试试睡眠专用软耳塞。<br><b>温度</b>：卧室温度控制在 18-22°C，偏凉一点更利于入睡。"});break;
      case "arousal": a.push({icon:"\uD83E\uDDD8",title:"给大脑一个'下班仪式'",
        text:"<b>睡前 1 小时远离屏幕</b>：蓝光抑制褪黑素分泌，让大脑误以为还是白天。<br><b>写下来</b>：睡前把脑子里想的事写在本子上，告诉自己'明天再处理'。<br><b>4-7-8 呼吸法</b>：吸气 4 秒→屏气 7 秒→呼气 8 秒，重复4次。强迫副交感神经接管。<br><b>身体扫描冥想</b>：从头到脚逐个部位放松，把注意力从思维转移到身体上。"});break;
      case "deep": a.push({icon:"\uD83D\uDE34",title:"增加深度睡眠的方法",
        text:"<b>规律运动</b>：每周 3-4 次中等强度运动（快走、游泳、瑜伽），但不要在睡前 2 小时内剧烈运动。<br><b>核心体温调节</b>：睡前洗个热水澡，出来后体温自然下降，这个下降过程会触发睡意。<br><b>限制白天小睡</b>：如果白天睡觉，控制在 20 分钟以内。<br><b>梦境记录</b>：醒来记梦说明你在REM期醒来。不必担心，但可以在床边放个本子把梦记下来，帮大脑'存档'。"});break;
      case "circadian": a.push({icon:"\u2600\uFE0F",title:"建立稳定的睡眠节律",
        text:"<b>固定起床时间</b>：即使是周末也尽量在同一时间起床。生物钟靠起床时间校准，而不是入睡时间。<br><b>早晨晒太阳</b>：起床后尽快接触自然光 15-30 分钟，告诉大脑白天开始了。<br><b>晚上调暗灯光</b>：睡前一小时把房间灯光调暗，开启暖色模式。<br><b>不要强行补觉</b>：周末睡太久会打乱生物钟，反而让睡眠更糟糕。"});break;
      case "lifestyle": a.push({icon:"\uD83C\uDF3F",title:"优化生活习惯",
        text:"<b>咖啡因截止线</b>：下午 2 点以后不喝咖啡、茶、可乐。咖啡因的半衰期是 5-7 小时。<br><b>规律运动</b>：哪怕每天快走 20 分钟，对睡眠的改善都立竿见影。<br><b>睡前 2 小时不进食</b>：消化会干扰睡眠，尤其避免高糖高脂食物。<br><b>酒精不是助眠</b>：酒精虽然让人容易入睡，但会破坏后半段的深度睡眠，导致早醒。"});break;
    }
  });
  if(a.length===0){a.push({icon:"\u2728",title:"整体表现不错",
    text:"你的睡眠各项指标都在相对健康的范围内。如果仍然感觉睡眠质量不够，建议从感官环境和作息规律上做微调。偶尔的睡眠波动是正常的，不必过度焦虑。"});}
  return a;
}

function spawnConfetti(count){
  var c=document.getElementById("confetti"),cl=["#b8c8e8","#9b8ec4","#6db3a0","#8898c0","#d4a574"];
  for(var i=0;i<count;i++){
    var p=document.createElement("div");p.className="confetti-piece";
    p.style.cssText="left:"+Math.random()*100+"%;background:"+cl[Math.floor(Math.random()*cl.length)]+";--cd:"+(2.5+Math.random()*3)+"s;--cdelay:"+Math.random()*1+"s;width:"+(4+Math.random()*6)+"px;height:"+(4+Math.random()*6)+"px";
    c.appendChild(p);setTimeout(function(){p.remove();},5000);
  }
}
function shareResult(){
  var t="\uD83C\uDF19 "+name+"的睡眠深度分析报告";
  if(navigator.share){navigator.share({title:"睡眠分析",text:t}).catch(function(){});return;}
  var ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.left="-9999px";
  document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
  toast("分析已复制");
}
function resetAll(){name="";answers=[];currentQ=0;history.replaceState(null,"",location.pathname);switchScreen("screen-welcome");}
function toast(m){
  var t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);
  setTimeout(function(){t.style.opacity="0";t.style.transition="opacity .4s";setTimeout(function(){t.remove();},400);},2000);
}
document.addEventListener("keydown",function(e){
  if(e.key!=="Enter")return;
  var a=document.querySelector(".screen.active");if(!a)return;
  if(a.id==="screen-quiz"){if(document.getElementById("name-section").style.display!=="none")confirmName();else nextQ();}
});
init();
</script>
