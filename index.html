<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>二十年后，重新认识你</title>
<style>
:root {
  --bg: #0d0d14; --card: rgba(255,255,255,0.04);
  --text: #d4d0c8; --sub: #8a8678;
  --gold: #c9a96e; --gold-dim: #a68b54;
  --warm: #d4a76a; --rose: #c47a5a;
  --radius: 16px; --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Noto Serif SC", "STSong", "Songti SC", "PingFang SC", "Microsoft YaHei", serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden; line-height: 1.8;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}
.bg-overlay {
  position: fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 30% 15%, rgba(201,169,110,.06) 0%, transparent 55%),
    radial-gradient(ellipse 60% 35% at 70% 80%, rgba(196,122,90,.05) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 50%, rgba(180,160,130,.03) 0%, transparent 60%);
}
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.star {
  position:absolute; border-radius:50%; background:var(--gold);
  animation: twinkle var(--d) ease-in-out infinite;
  animation-delay: var(--delay); opacity:0;
}
@keyframes twinkle {
  0%,100% { opacity:0.08; transform:scale(1); }
  50% { opacity:0.35; transform:scale(1.6); }
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(24px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes pulse-warm {
  0%,100% { transform:scale(1); opacity:0.7; }
  50% { transform:scale(1.06); opacity:1; }
}
@keyframes confetti-fall {
  0% { transform:translateY(-10vh) rotate(0deg); opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}

.container {
  position:relative; z-index:1;
  max-width:460px; margin:0 auto; padding:24px 18px 48px;
  min-height:100vh; display:flex; flex-direction:column;
}
.screen { display:none; flex-direction:column; flex:1; }
.screen.active { display:flex; animation:slideUp .6s ease; }

.welcome { align-items:center; justify-content:center; text-align:center; gap:28px; }
.welcome .icon { font-size:56px; animation:pulse-warm 3s ease-in-out infinite; }
.welcome .divider {
  width:40px; height:1px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.welcome h1 {
  font-size:26px; font-weight:400; letter-spacing:2px;
  color: var(--gold); line-height:1.5;
}
.welcome .subtitle { color:var(--sub); font-size:14px; max-width:280px; line-height:1.8; }
.welcome .signature { font-size:12px; color:var(--gold-dim); letter-spacing:3px; margin-top:4px; }

.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:13px 32px; border-radius:40px; border:none;
  font-size:15px; font-weight:400; cursor:pointer;
  transition: all .35s; letter-spacing:1px;
  -webkit-tap-highlight-color:transparent;
}
.btn-primary {
  background: linear-gradient(135deg, var(--gold), var(--warm));
  color: var(--bg); width:100%; max-width:280px;
  box-shadow: 0 6px 24px rgba(201,169,110,.18);
}
.btn-primary:active { transform:scale(.96); }
.btn-secondary {
  background: rgba(255,255,255,.05); color:var(--text);
  border:1px solid rgba(255,255,255,.08); width:100%; max-width:280px;
}
.btn-secondary:active { background: rgba(255,255,255,.1); }
.btn-sm {
  padding:10px 22px; font-size:13px; border-radius:24px; letter-spacing:0;
  background: rgba(255,255,255,.05); color:var(--text);
  border:1px solid rgba(255,255,255,.08); cursor:pointer;
}
.btn-sm:active { background: rgba(255,255,255,.1); }

.card {
  background:var(--card); border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.06);
  padding:20px; backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}

.progress-bar {
  width:100%; height:2px; background:rgba(255,255,255,.06);
  border-radius:1px; overflow:hidden; margin-bottom:28px;
}
.progress-fill {
  height:100%; border-radius:1px;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  transition: width .5s ease;
}

.quiz-header { text-align:center; margin-bottom:28px; }
.quiz-header .q-num { color:var(--gold-dim); font-size:11px; letter-spacing:2px; }
.question-text {
  font-size:19px; font-weight:400; text-align:center; margin-bottom:28px;
  line-height:1.7; color: var(--text);
}
.option {
  display:flex; align-items:center; gap:14px; padding:15px 16px;
  background:var(--card); border-radius:var(--radius-sm);
  border:1px solid rgba(255,255,255,.05); cursor:pointer;
  transition:all .3s; margin-bottom:10px;
}
.option:active { transform:scale(.98); }
.option.selected {
  border-color:var(--gold);
  background:rgba(201,169,110,.08);
}
.option .opt-check {
  width:20px; height:20px; border-radius:50%; flex-shrink:0;
  border:1px solid rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center;
  font-size:11px; transition:all .3s; color:transparent;
}
.option.selected .opt-check {
  border-color:var(--gold); background:var(--gold); color:var(--bg);
}
.option .opt-text { font-size:14px; line-height:1.5; }

.input-group { margin-bottom:20px; }
.input-group label { display:block; font-size:13px; font-weight:400; margin-bottom:8px; color:var(--sub); }
.input-group input {
  width:100%; padding:13px 16px; border-radius:var(--radius-sm);
  background:var(--card); border:1px solid rgba(255,255,255,.08);
  color:var(--text); font-size:16px; outline:none; transition:border-color .3s;
  font-family: inherit;
}
.input-group input:focus { border-color:var(--gold); }
.input-group input::placeholder { color:rgba(255,255,255,.15); }

.share-screen { align-items:center; justify-content:center; text-align:center; gap:20px; }
.share-screen .share-icon { font-size:48px; opacity:0.8; }
.share-screen h2 { font-size:22px; font-weight:400; color:var(--gold); letter-spacing:1px; }
.share-screen p { color:var(--sub); font-size:13px; line-height:1.8; }
.share-link-box {
  width:100%; padding:14px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,.03); border:1px dashed rgba(255,255,255,.1);
  word-break:break-all; font-size:11px; color:var(--sub); text-align:left;
  max-height:80px; overflow-y:auto; user-select:text; -webkit-user-select:text;
}
.qr-wrapper { background:#f5f0e8; padding:12px; border-radius:14px; display:inline-block; }
.qr-wrapper canvas { display:block; }
.qr-hint { font-size:11px; color:var(--sub); margin-top:8px; letter-spacing:1px; }

.results-screen { gap:20px; align-items:center; padding-top:8px; }
.results-screen .result-header { text-align:center; }
.result-header .match-names {
  font-size:18px; font-weight:400; letter-spacing:1px;
}
.result-header .match-names span { color:var(--gold); }
.result-header .year-tag { font-size:11px; color:var(--sub); letter-spacing:2px; margin-top:4px; }

.score-circle {
  position:relative; width:170px; height:170px; margin:0 auto;
}
.score-circle svg { transform:rotate(-90deg); width:170px; height:170px; }
.score-circle .bg-ring { fill:none; stroke:rgba(255,255,255,.05); stroke-width:6; }
.score-circle .fg-ring {
  fill:none; stroke:url(#scoreGrad); stroke-width:6; stroke-linecap:round;
  stroke-dasharray:502; stroke-dashoffset:var(--score-offset);
  transition: stroke-dashoffset 1.8s cubic-bezier(.4,0,.2,1);
}
.score-circle .score-text {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.score-text .percent { font-size:44px; font-weight:300; line-height:1; color:var(--gold); }
.score-text .label { font-size:11px; color:var(--sub); margin-top:4px; letter-spacing:1px; }

.result-badge {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 20px; border-radius:40px;
  font-size:15px; font-weight:400; letter-spacing:1px;
  background: rgba(201,169,110,.08); color:var(--gold);
  border:1px solid rgba(201,169,110,.15);
}

.categories { width:100%; display:flex; flex-direction:column; gap:10px; }
.cat-item { display:flex; flex-direction:column; gap:5px; }
.cat-header { display:flex; justify-content:space-between; font-size:12px; }
.cat-header .cat-name { color:var(--sub); letter-spacing:1px; }
.cat-header .cat-score { font-weight:400; }
.cat-bar-bg { height:4px; border-radius:2px; background:rgba(255,255,255,.05); overflow:hidden; }
.cat-bar-fill { height:100%; border-radius:2px; transition:width 1s ease .3s; }
.cat-bar-fill.c1 { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
.cat-bar-fill.c2 { background: linear-gradient(90deg, var(--rose), var(--warm)); }
.cat-bar-fill.c3 { background: linear-gradient(90deg, #a0a0b0, #c0b8a0); }
.cat-bar-fill.c4 { background: linear-gradient(90deg, #8a8a70, #b0a888); }

.summary-card {
  background:var(--card); border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.06); padding:24px 20px;
  width:100%; text-align:center;
}
.summary-card .summary-quote {
  font-size:18px; color:var(--gold); line-height:1.8; font-style:italic;
  margin-bottom:16px;
}
.summary-card .summary-text {
  font-size:13px; color:var(--sub); line-height:2; text-align:left;
}

.confetti-container { position:fixed; inset:0; pointer-events:none; z-index:10; overflow:hidden; }
.confetti-piece {
  position:absolute; top:-10px; width:8px; height:8px; border-radius:50%;
  animation: confetti-fall var(--cd) linear forwards;
  animation-delay: var(--cdelay);
}

.toast {
  position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
  padding:11px 24px; border-radius:40px; background:rgba(0,0,0,.88);
  color:var(--gold); font-size:13px; z-index:100; animation:slideUp .3s ease;
  pointer-events:none; white-space:nowrap; letter-spacing:1px;
}

@media (max-width:380px) {
  .welcome h1 { font-size:22px; }
  .question-text { font-size:17px; }
  .score-circle { width:140px; height:140px; }
  .score-circle svg { width:140px; height:140px; }
  .score-text .percent { font-size:36px; }
}
</style>
</head>
<body>
<div class="bg-overlay"></div>
<div class="stars" id="stars"></div>

<div class="container" id="app">
  <!-- Welcome -->
  <div class="screen welcome active" id="screen-welcome">
    <div class="icon">🌙</div>
    <h1>二十年后<br>重新认识你</h1>
    <div class="divider"></div>
    <p class="subtitle">十二道关于时光、成长与爱的问答。写完后生成链接发给 Ta，看看二十年光阴里，你们各自变成了怎样的人。</p>
    <p class="signature">— 给好久不见的你</p>
    <button class="btn btn-primary" onclick="startQuiz()">开始书写</button>
  </div>

  <!-- Quiz A -->
  <div class="screen" id="screen-quiz-a">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="quiz-header"><div class="q-num" id="q-num"></div></div>
    <div id="name-section-a" class="card" style="text-align:center;">
      <p style="font-size:16px;color:var(--gold);">你的名字</p>
      <div class="input-group" style="margin-top:14px;">
        <input type="text" id="name-a" placeholder="留下一个称呼" maxlength="12" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="confirmNameA()" style="margin-top:6px;">开始回答</button>
    </div>
    <div id="quiz-section-a" style="display:none;flex:1;flex-direction:column;">
      <p class="question-text" id="question-text"></p>
      <div id="options-container"></div>
      <div style="margin-top:auto;display:flex;gap:10px;padding-top:20px;">
        <button class="btn btn-secondary btn-sm" id="btn-prev" style="display:none;" onclick="prevQuestion()">← 上一题</button>
        <button class="btn btn-primary btn-sm" id="btn-next" onclick="nextQuestion()" style="flex:1;">下一题 →</button>
      </div>
    </div>
  </div>

  <!-- Share -->
  <div class="screen share-screen" id="screen-share">
    <div class="share-icon">✉️</div>
    <h2>你的回答已封存</h2>
    <p>把链接发给 Ta，或者让 Ta 扫码<br>一起完成这场穿越二十年的对话</p>
    <div id="qr-container"></div>
    <div class="share-link-box" id="share-link" style="margin-top:8px;"></div>
    <button class="btn btn-primary" onclick="copyShareLink()">📋 复制链接，发送给 Ta</button>
    <button class="btn btn-secondary" onclick="resetAll()">重新书写</button>
  </div>

  <!-- Quiz B -->
  <div class="screen" id="screen-quiz-b">
    <div class="card" style="text-align:center;margin-bottom:18px;">
      <p style="color:var(--gold);font-size:15px;">🕊 <span id="person-a-name"></span> 邀请你回答这些问题</p>
      <p style="color:var(--sub);font-size:12px;margin-top:4px;">没有标准答案，只有真实的心</p>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill-b" style="width:0%"></div></div>
    <div id="name-section-b" class="card" style="text-align:center;">
      <p style="font-size:16px;color:var(--gold);">你的名字</p>
      <div class="input-group" style="margin-top:14px;">
        <input type="text" id="name-b" placeholder="留下一个称呼" maxlength="12" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="confirmNameB()" style="margin-top:6px;">开始回答</button>
    </div>
    <div id="quiz-section-b" style="display:none;flex:1;flex-direction:column;">
      <p class="question-text" id="question-text-b"></p>
      <div id="options-container-b"></div>
      <div style="margin-top:auto;display:flex;gap:10px;padding-top:20px;">
        <button class="btn btn-secondary btn-sm" id="btn-prev-b" style="display:none;" onclick="prevQuestionB()">← 上一题</button>
        <button class="btn btn-primary btn-sm" id="btn-next-b" onclick="nextQuestionB()" style="flex:1;">下一题 →</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="screen results-screen" id="screen-results">
    <div class="result-header">
      <div class="match-names"><span id="r-name-a"></span> &nbsp;·&nbsp; <span id="r-name-b"></span></div>
      <div class="year-tag">穿越二十年的对话</div>
    </div>
    <div class="score-circle">
      <svg viewBox="0 0 180 180">
        <defs>
          <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#c9a96e"/>
            <stop offset="100%" stop-color="#d4a76a"/>
          </linearGradient>
        </defs>
        <circle class="bg-ring" cx="90" cy="90" r="80"/>
        <circle class="fg-ring" id="score-ring" cx="90" cy="90" r="80"/>
      </svg>
      <div class="score-text">
        <div class="percent" id="score-percent">--%</div>
        <div class="label">灵魂共振</div>
      </div>
    </div>
    <div class="result-badge" id="result-badge"></div>
    <div class="categories" id="categories"></div>
    <div class="summary-card" id="summary-card"></div>
    <button class="btn btn-primary" onclick="resetAll()" style="margin-top:6px;">重新书写</button>
    <button class="btn btn-secondary btn-sm" onclick="shareResult()">分享结果</button>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
var questions = [
  { text:'如果用一个词形容你过去这些年的心路历程，会是哪个？', options:[
    { text:'蜕变——破茧而出，成为了不同的人' },
    { text:'漂泊——一直在寻找，走了很远的路' },
    { text:'沉淀——经历了很多，越来越安静' },
    { text:'守护——守着心里重要的人和事' }
  ]},
  { text:'回望青春岁月，你最怀念的是什么？', options:[
    { text:'那种毫无保留的勇气和炽热' },
    { text:'当时的简单纯粹，什么都不用想' },
    { text:'一起做过的那些傻事和笑过的时光' },
    { text:'对未来无限的想象和憧憬' }
  ]},
  { text:'这些年里，哪个瞬间让你真正觉得自己长大了？', options:[
    { text:'第一次为家人扛起责任的时刻' },
    { text:'经历一场彻底告别之后' },
    { text:'独自穿越困境，走出来后发现天亮了' },
    { text:'有一天回头看，发现已走了很远' }
  ]},
  { text:'你觉得现在的自己，和年轻时候最大的不同是什么？', options:[
    { text:'更懂得自己想要什么，不再迷茫' },
    { text:'更柔软了，学会了原谅和放过自己' },
    { text:'更清楚什么东西才是真正重要的' },
    { text:'更勇敢了，不再害怕失去' }
  ]},
  { text:'你相信"缘分"这件事吗？', options:[
    { text:'深信——有些相遇是命运的安排' },
    { text:'信，但也需要人主动去抓住' },
    { text:'半信半疑，看时间怎么说' },
    { text:'更相信事在人为，缘分是人创造的' }
  ]},
  { text:'如果人生是一本书，你觉得现在正在写哪一章？', options:[
    { text:'刚刚翻过最难的一章，迎来转折' },
    { text:'正在写下最精彩的部分' },
    { text:'重新审视和梳理前面的内容' },
    { text:'准备开启一个全新的篇章' }
  ]},
  { text:'在你心里，"爱"最好的样子是什么？', options:[
    { text:'无需多言就能懂的默契' },
    { text:'各自独立，又彼此滋养' },
    { text:'经历风雨后依然选择彼此' },
    { text:'平淡日常里的温柔和陪伴' }
  ]},
  { text:'你最害怕的是什么？', options:[
    { text:'错过真正重要的人和事' },
    { text:'活得不够真实，辜负了自己' },
    { text:'来不及说出口的话和来不及做的事' },
    { text:'被时间冲刷，被遗忘' }
  ]},
  { text:'如果可以跟年轻时候的自己说一句话，你会说什么？', options:[
    { text:'别怕，你会好好的——一切都会过去' },
    { text:'勇敢一点，有些事别留遗憾' },
    { text:'谢谢你当时的坚持和不服输' },
    { text:'有些答案，不用急着找，时间会给你' }
  ]},
  { text:'经历了这么多，什么样的人会让你觉得值得用余生去靠近？', options:[
    { text:'能一起安静待着，不说话也舒服' },
    { text:'各自精彩，又彼此欣赏和懂得' },
    { text:'经历过离散，更懂得重逢的分量' },
    { text:'一个眼神就知道对方在想什么' }
  ]},
  { text:'你觉得你身上的哪一点最珍贵，却常常被忽略？', options:[
    { text:'细腻的感知力——能察觉到别人察觉不到的东西' },
    { text:'不动声色的坚强——从不张扬，但从不倒下' },
    { text:'对在乎的人毫无保留地好' },
    { text:'骨子里的善良——不经意间温暖过很多人' }
  ]},
  { text:'多年后重新认识一个人，你最在意的是什么？', options:[
    { text:'他有没有变成更好的人' },
    { text:'彼此之间还能不能像从前那样说话' },
    { text:'那种说不清的熟悉感是否还在' },
    { text:'能不能一起面对最真实的自己' }
  ]}
];

var catMap = {
  time: [0,1,2,5],
  love: [6,7,9],
  growth: [3,4,8],
  soul: [10,11]
};
var catNames = { time:'岁月感悟', love:'爱之理解', growth:'自我成长', soul:'灵魂底色' };
var catColors = { time:'c1', love:'c2', growth:'c3', soul:'c4' };

var nameA='', nameB='', answersA=[], answersB=[], currentQ=0, mode='a';

function base64urlEncode(s){return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/g,'');}
function base64urlDecode(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return decodeURIComponent(escape(atob(s)));}
function encodeData(n,a){return base64urlEncode(JSON.stringify({n:n,a:a}));}
function decodeData(s){try{var d=JSON.parse(base64urlDecode(s));if(d.n&&d.a&&d.a.length===12)return d;}catch(e){}return null;}

function init(){
  createStars();
  var d=null, qp=new URLSearchParams(location.search), r=qp.get('d')||'';
  if(!r) r=location.hash.slice(1);
  if(r) d=decodeData(r);
  if(d){ nameA=d.n; answersA=d.a; mode='b'; }
  if(mode==='b'){
    document.getElementById('person-a-name').textContent=nameA;
    switchScreen('screen-quiz-b');
    answersB=new Array(12).fill(-1);
    renderQuestionB(0);
  }
}

function createStars(){
  var c=document.getElementById('stars');
  for(var i=0;i<40;i++){
    var s=document.createElement('div'); s.className='star';
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(1+Math.random()*2)+'px;height:'+(1+Math.random()*2)+'px;--d:'+(3+Math.random()*5)+'s;--delay:'+Math.random()*6+'s';
    c.appendChild(s);
  }
}

function switchScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz(){
  mode='a'; answersA=new Array(12).fill(-1); currentQ=0;
  switchScreen('screen-quiz-a');
  document.getElementById('name-section-a').style.display='block';
  document.getElementById('quiz-section-a').style.display='none';
  document.getElementById('name-a').value='';
  setTimeout(function(){document.getElementById('name-a').focus();},300);
}
function confirmNameA(){
  var n=document.getElementById('name-a').value.trim();
  if(!n){document.getElementById('name-a').focus();return;}
  nameA=n;
  document.getElementById('name-section-a').style.display='none';
  document.getElementById('quiz-section-a').style.display='flex';
  renderQuestion(0);
}
function renderQuestion(idx){
  currentQ=idx; var q=questions[idx];
  document.getElementById('q-num').textContent='第 '+(idx+1)+' / 12 题';
  document.getElementById('question-text').textContent=q.text;
  document.getElementById('progress-fill').style.width=(idx/12*100)+'%';
  var c=document.getElementById('options-container'); c.innerHTML='';
  q.options.forEach(function(o,i){
    var d=document.createElement('div');
    d.className='option'+(answersA[idx]===i?' selected':'');
    d.innerHTML='<span class=\"opt-check\">'+(answersA[idx]===i?'\u2713':'')+'</span><span class=\"opt-text\">'+o.text+'</span>';
    d.onclick=(function(qi,oi){return function(){selectOption(qi,oi);};})(idx,i);
    c.appendChild(d);
  });
  document.getElementById('btn-prev').style.display=idx>0?'inline-flex':'none';
  var b=document.getElementById('btn-next');
  b.textContent=idx===11?'\u2726 封存回答':'下一题 \u2192';
  var ok=answersA[idx]>=0; b.style.opacity=ok?'1':'0.4'; b.style.pointerEvents=ok?'auto':'none';
}
function selectOption(qi,oi){ answersA[qi]=oi; renderQuestion(qi); }
function nextQuestion(){ if(answersA[currentQ]<0)return; if(currentQ<11)renderQuestion(currentQ+1); else finishA(); }
function prevQuestion(){ if(currentQ>0)renderQuestion(currentQ-1); }
function finishA(){
  var l=location.origin+location.pathname+'?d='+encodeData(nameA,answersA);
  document.getElementById('share-link').textContent=l;
  switchScreen('screen-share');
  genQR(l);
}
function genQR(url){
  var c=document.getElementById('qr-container'); if(!c)return;
  c.innerHTML='<div class=\"qr-wrapper\"><canvas id=\"qr-canvas\"></canvas></div><div class=\"qr-hint\">好友扫码即可参与</div>';
  var cv=document.getElementById('qr-canvas');
  var img=new Image(); img.crossOrigin='anonymous';
  img.onload=function(){
    var s=Math.min(180,window.innerWidth-80);
    cv.width=s; cv.height=s;
    var ctx=cv.getContext('2d');
    ctx.fillStyle='#f5f0e8'; ctx.fillRect(0,0,s,s);
    ctx.drawImage(img,0,0,s,s);
  };
  img.onerror=function(){c.innerHTML='';};
  img.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(url);
}
function copyShareLink(){
  var l=document.getElementById('share-link').textContent;
  if(navigator.share){navigator.share({title:'二十年后，重新认识你',text:nameA+'邀请你赴一场穿越二十年的对话',url:l}).catch(function(){fallbackCopy(l);});return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(l).then(function(){toast('已复制，去微信发给 Ta 吧');}).catch(function(){fallbackCopy(l);});return;}
  fallbackCopy(l);
}
function fallbackCopy(t){
  var ta=document.createElement('textarea'); ta.value=t;
  ta.style.position='fixed';ta.style.left='-9999px';ta.style.top='0';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{var ok=document.execCommand('copy');toast(ok?'已复制，去微信发给 Ta 吧':'请长按上方链接手动复制');}catch(e){toast('请长按上方链接手动复制');}
  document.body.removeChild(ta);
}

function confirmNameB(){
  var n=document.getElementById('name-b').value.trim();
  if(!n){document.getElementById('name-b').focus();return;}
  nameB=n;
  document.getElementById('name-section-b').style.display='none';
  document.getElementById('quiz-section-b').style.display='flex';
  renderQuestionB(0);
}
function renderQuestionB(idx){
  currentQ=idx; var q=questions[idx];
  document.getElementById('question-text-b').textContent=q.text;
  document.getElementById('progress-fill-b').style.width=(idx/12*100)+'%';
  var c=document.getElementById('options-container-b'); c.innerHTML='';
  q.options.forEach(function(o,i){
    var d=document.createElement('div');
    d.className='option'+(answersB[idx]===i?' selected':'');
    d.innerHTML='<span class=\"opt-check\">'+(answersB[idx]===i?'\u2713':'')+'</span><span class=\"opt-text\">'+o.text+'</span>';
    d.onclick=(function(qi,oi){return function(){selectOptionB(qi,oi);};})(idx,i);
    c.appendChild(d);
  });
  document.getElementById('btn-prev-b').style.display=idx>0?'inline-flex':'none';
  var b=document.getElementById('btn-next-b');
  b.textContent=idx===11?'\uD83C\uDF19 看看我们的故事':'下一题 \u2192';
  var ok=answersB[idx]>=0; b.style.opacity=ok?'1':'0.4'; b.style.pointerEvents=ok?'auto':'none';
}
function selectOptionB(qi,oi){ answersB[qi]=oi; renderQuestionB(qi); }
function nextQuestionB(){ if(answersB[currentQ]<0)return; if(currentQ<11)renderQuestionB(currentQ+1); else showResults(); }
function prevQuestionB(){ if(currentQ>0)renderQuestionB(currentQ-1); }

function showResults(){
  switchScreen('screen-results');
  document.getElementById('r-name-a').textContent=nameA;
  document.getElementById('r-name-b').textContent=nameB;
  var total=calcTotal(answersA,answersB);
  var cats={};
  for(var k in catMap){cats[k]=calcCat(answersA,answersB,catMap[k]);}
  setTimeout(function(){
    var ring=document.getElementById('score-ring');
    var circ=2*Math.PI*80;
    ring.style.strokeDashoffset=circ-(total/100)*circ;
  },300);
  animateCounter('score-percent',total,1800);
  var badge=getBadge(total);
  document.getElementById('result-badge').innerHTML=badge.e+' '+badge.t;
  var cc=document.getElementById('categories');cc.innerHTML='';
  for(var k in cats){
    var s=cats[k], item=document.createElement('div');
    item.className='cat-item';
    item.innerHTML='<div class=\"cat-header\"><span class=\"cat-name\">'+catNames[k]+'</span><span class=\"cat-score\">'+s+'%</span></div><div class=\"cat-bar-bg\"><div class=\"cat-bar-fill '+catColors[k]+'\" style=\"width:'+s+'%\"></div></div>';
    cc.appendChild(item);
  }
  var sm=getSummary(total,cats);
  document.getElementById('summary-card').innerHTML='<div class=\"summary-quote\">'+sm.q+'</div><div class=\"summary-text\">'+sm.t+'</div>';
  if(total>=60) spawnConfetti(total>=80?60:30);
}
function calcTotal(a1,a2){
  var t=0;for(var i=0;i<12;i++){t+=(3-Math.abs(a1[i]-a2[i]))/3;}return Math.round((t/12)*100);
}
function calcCat(a1,a2,idx){
  var t=0;for(var j=0;j<idx.length;j++){t+=(3-Math.abs(a1[idx[j]]-a2[idx[j]]))/3;}return Math.round((t/idx.length)*100);
}
function animateCounter(id,target,dur){
  var el=document.getElementById(id),st=0;
  function step(ts){
    if(!st)st=ts;
    var p=Math.min((ts-st)/dur,1),e=1-Math.pow(1-p,3);
    el.textContent=Math.round(e*target)+'%';
    if(p<1)requestAnimationFrame(step);else el.textContent=target+'%';
  }
  requestAnimationFrame(step);
}
function getBadge(s){
  if(s>=90)return{e:'\uD83D\uDD4A',t:'久别如初见'};
  if(s>=80)return{e:'\uD83C\uDF05',t:'跨越时光的共鸣'};
  if(s>=70)return{e:'\uD83C\uDF19',t:'同一个月亮下'};
  if(s>=60)return{e:'\uD83C\uDF3F',t:'温柔的靠近'};
  if(s>=45)return{e:'\uD83C\uDF42',t:'两棵不同的树'};
  return{e:'\uD83C\uDF0C',t:'不同的星河'};
}
function getSummary(total,cats){
  var h=[],l=[];
  for(var k in cats){if(cats[k]>=70)h.push(catNames[k]);if(cats[k]<40)l.push(catNames[k]);}
  var hs=h.length?h.join('\u3001'):'';
  var ls=l.length?l.join('\u3001'):'';
  if(total>=85)return{q:'时间从未真正改变什么——它只是让两颗心走了一圈，又回到原点。',t:'你们在灵魂深处有着惊人的共鸣。'+(hs?'尤其在'+hs+'上，你们的答案像隔空对话一样默契。二十年的光阴没有让彼此变成陌生人，反而让某些东西更加清晰。':'也许最好的重逢就是：兜兜转转，发现那个人还是最懂你的人。')};
  if(total>=70)return{q:'各自走了很远的路，抬头时发现望着同一片天空。',t:'你们之间有很深的默契。'+(hs?'在'+hs+'上，你们的心跳频率惊人地一致。':'虽然经历了不同的生活轨迹，但你们对很多事情的感受是相通的。二十年的时间教会了你们用不同的方式表达相似的心。')};
  if(total>=55)return{q:'两段各自精彩的旅程，在某处开始有了交集。',t:'你们在很多重要的事情上有着相似的看法。'+(hs?hs+'是你们的连接点和共鸣区。':'')+(ls?'在'+ls+'上你们有些不同，但这正是重新认识的乐趣——二十年的时间，足够让一个人变得丰富而有趣。':'')};
  if(total>=40)return{q:'不同的河流，汇入同一片海。',t:'你们经历和选择各不相同，但某些深处的东西是相通的。'+(hs?'最默契的是在'+hs+'上。':'')+(ls?'在'+ls+'上你们走了不一样的路，但每一条都值得被了解。':'')+'也许重新认识的意义不在于寻找多少共同点，而在于发现：原来你可以成为这样的人。'};
  return{q:'没有什么比两颗真实的心相遇更动人的事。',t:'你们的回答呈现出截然不同的人生轨迹和生活态度。但这或许正是重新认识的价值——二十年后，重要的不是你们有多像，而是你们是否愿意了解对方变成了什么样的人。有时候，差异本身就是一种引力。'};
}
function spawnConfetti(count){
  var c=document.getElementById('confetti'),cl=['#c9a96e','#d4a76a','#c47a5a','#b0a070','#a09070','#c0b090'];
  for(var i=0;i<count;i++){
    var p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText='left:'+Math.random()*100+'%;background:'+cl[Math.floor(Math.random()*cl.length)]+';--cd:'+(2.5+Math.random()*3)+'s;--cdelay:'+Math.random()*1+'s;width:'+(4+Math.random()*6)+'px;height:'+(4+Math.random()*6)+'px';
    c.appendChild(p);setTimeout(function(){p.remove();},5000);
  }
}
function shareResult(){
  var s=document.getElementById('score-percent').textContent;
  var b=document.getElementById('result-badge').textContent;
  var t='\uD83C\uDF19 二十年后，重新认识你\\n'+nameA+' & '+nameB+' \u7075\u9B42\u5171\u632F\uFF1A'+s+' '+b;
  if(navigator.share){navigator.share({title:'二十年后，重新认识你',text:t}).catch(function(){});return;}
  var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);ta.select();
  var ok=document.execCommand('copy');document.body.removeChild(ta);
  toast(ok?'\u7ED3\u679C\u5DF2\u590D\u5236\uFF0C\u53BB\u5206\u4EAB\u5427':'\u590D\u5236\u5931\u8D25');
}
function resetAll(){
  nameA='';nameB='';answersA=[];answersB=[];currentQ=0;mode='a';
  history.replaceState(null,'',location.pathname);
  switchScreen('screen-welcome');
}
function toast(m){
  var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(function(){t.remove();},400);},2000);
}
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter')return;
  var a=document.querySelector('.screen.active');if(!a)return;
  if(a.id==='screen-quiz-a'){if(document.getElementById('name-section-a').style.display!=='none')confirmNameA();else nextQuestion();}
  else if(a.id==='screen-quiz-b'){if(document.getElementById('name-section-b').style.display!=='none')confirmNameB();else nextQuestionB();}
});
init();
</script>
</body>
</html>
