<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>灵魂契合度测试</title>
<style>
:root {
  --bg: #0f0f1a;
  --card: rgba(255,255,255,0.06);
  --text: #e8e8f0;
  --sub: #9898b0;
  --accent: #ff6b9d;
  --accent2: #c44dff;
  --accent3: #4da6ff;
  --gold: #ffd700;
  --success: #4ade80;
  --radius: 20px;
  --radius-sm: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
/* animated bg */
.bg-stars {
  position: fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(196,77,255,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 85%, rgba(255,107,157,.10) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(77,166,255,.06) 0%, transparent 60%);
}
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.star {
  position:absolute; border-radius:50%; background:white;
  animation: twinkle var(--d) ease-in-out infinite;
  animation-delay: var(--delay);
  opacity:0;
}
@keyframes twinkle {
  0%,100% { opacity:0.15; transform:scale(1); }
  50% { opacity:0.6; transform:scale(1.5); }
}
@keyframes float {
  0%,100% { transform:translateY(0) rotate(0deg); }
  50% { transform:translateY(-20px) rotate(10deg); }
}
@keyframes pulse {
  0%,100% { transform:scale(1); opacity:0.8; }
  50% { transform:scale(1.08); opacity:1; }
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}
@keyframes scoreFill {
  from { stroke-dashoffset:565; }
  to { stroke-dashoffset:var(--score-offset); }
}
@keyframes barGrow {
  from { width:0; }
  to { width:var(--bar-w); }
}
@keyframes bounceIn {
  0% { transform:scale(0); opacity:0; }
  50% { transform:scale(1.15); }
  100% { transform:scale(1); opacity:1; }
}
@keyframes heartBeat {
  0%,100% { transform:scale(1); }
  15% { transform:scale(1.3); }
  30% { transform:scale(1); }
  45% { transform:scale(1.2); }
  60% { transform:scale(1); }
}
@keyframes confetti-fall {
  0% { transform:translateY(-10vh) rotate(0deg); opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}

/* layout */
.container {
  position:relative; z-index:1;
  max-width:460px; margin:0 auto; padding:20px 16px 40px;
  min-height:100vh; display:flex; flex-direction:column;
}
.screen { display:none; flex-direction:column; flex:1; }
.screen.active { display:flex; animation:slideUp .5s ease; }

/* welcome */
.welcome { align-items:center; justify-content:center; text-align:center; gap:24px; }
.welcome .icon {
  font-size:72px; animation:heartBeat 2s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(255,107,157,.5));
}
.welcome h1 {
  font-size:32px; font-weight:800;
  background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.welcome p { color:var(--sub); font-size:15px; line-height:1.6; max-width:280px; }
.floating-hearts { position:absolute; pointer-events:none; }
.float-heart {
  position:absolute; font-size:20px;
  animation: float var(--fd) ease-in-out infinite;
  animation-delay: var(--fdelay);
  opacity:0.3;
}

/* buttons */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:14px 36px; border-radius:50px; border:none;
  font-size:16px; font-weight:700; cursor:pointer;
  transition: all .3s; position:relative; overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color:#fff; box-shadow: 0 8px 30px rgba(255,107,157,.35);
  width:100%; max-width:300px;
}
.btn-primary:active { transform:scale(.96); box-shadow: 0 4px 15px rgba(255,107,157,.25); }
.btn-secondary {
  background: rgba(255,255,255,.08); color:var(--text);
  border:1px solid rgba(255,255,255,.12); width:100%; max-width:300px;
}
.btn-secondary:active { background: rgba(255,255,255,.14); }
.btn-sm {
  padding:10px 24px; font-size:14px; border-radius:25px;
  background: rgba(255,255,255,.08); color:var(--text);
  border:1px solid rgba(255,255,255,.12); cursor:pointer;
}
.btn-sm:active { background: rgba(255,255,255,.14); }
.btn-icon { font-size:18px; }

/* card */
.card {
  background:var(--card); border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.08);
  padding:20px; backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}

/* progress */
.progress-bar {
  width:100%; height:4px; background:rgba(255,255,255,.1);
  border-radius:2px; overflow:hidden; margin-bottom:24px;
}
.progress-fill {
  height:100%; border-radius:2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width .4s ease;
}

/* questions */
.quiz-header { text-align:center; margin-bottom:28px; }
.quiz-header .q-num { color:var(--accent); font-size:13px; font-weight:600; letter-spacing:1px; }
.quiz-header h2 { font-size:20px; margin-top:8px; font-weight:700; }
.question-card { margin-bottom:20px; }
.option {
  display:flex; align-items:center; gap:12px; padding:16px 18px;
  background:var(--card); border-radius:var(--radius-sm);
  border:2px solid transparent; cursor:pointer;
  transition:all .25s; margin-bottom:10px;
}
.option:active { transform:scale(.98); }
.option.selected {
  border-color:var(--accent);
  background:rgba(255,107,157,.12);
  box-shadow: 0 0 20px rgba(255,107,157,.15);
}
.option .opt-icon { font-size:24px; flex-shrink:0; width:32px; text-align:center; }
.option .opt-text { font-size:15px; line-height:1.4; }
.option .opt-check {
  width:22px; height:22px; border-radius:50%; flex-shrink:0;
  border:2px solid rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center;
  font-size:12px; transition:all .25s;
}
.option.selected .opt-check {
  border-color:var(--accent); background:var(--accent); color:#fff;
}

/* name input */
.input-group { margin-bottom:20px; }
.input-group label { display:block; font-size:14px; font-weight:600; margin-bottom:8px; color:var(--sub); }
.input-group input {
  width:100%; padding:14px 18px; border-radius:var(--radius-sm);
  background:var(--card); border:2px solid rgba(255,255,255,.1);
  color:var(--text); font-size:16px; outline:none; transition:border-color .3s;
}
.input-group input:focus { border-color:var(--accent); }
.input-group input::placeholder { color:rgba(255,255,255,.2); }

/* share screen */
.share-screen { align-items:center; justify-content:center; text-align:center; gap:20px; }
.share-screen .share-icon { font-size:64px; animation:bounceIn .6s ease; }
.share-screen h2 { font-size:24px; font-weight:800; }
.share-screen p { color:var(--sub); font-size:14px; line-height:1.6; }
.share-link-box { user-select:text; -webkit-user-select:text;
  width:100%; padding:14px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,.04); border:1px dashed rgba(255,255,255,.15);
  word-break:break-all; font-size:12px; color:var(--sub); text-align:left;
  max-height:80px; overflow-y:auto;
}

/* results */
.results-screen { gap:24px; align-items:center; padding-top:10px; }
.results-screen .result-header { text-align:center; }
.result-header .match-names { font-size:20px; font-weight:700; margin-bottom:4px; }
.result-header .match-names span { color:var(--accent); }
.score-circle {
  position:relative; width:180px; height:180px; margin:0 auto;
}
.score-circle svg { transform:rotate(-90deg); width:180px; height:180px; }
.score-circle .bg-ring {
  fill:none; stroke:rgba(255,255,255,.08); stroke-width:8;
}
.score-circle .fg-ring {
  fill:none; stroke:url(#scoreGrad); stroke-width:8; stroke-linecap:round;
  stroke-dasharray:565; stroke-dashoffset:var(--score-offset);
  transition: stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1);
}
.score-circle .score-text {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.score-text .percent { font-size:48px; font-weight:900; line-height:1; }
.score-text .label { font-size:13px; color:var(--sub); margin-top:4px; }

.result-badge {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 20px; border-radius:50px;
  font-size:16px; font-weight:700;
  background: rgba(255,215,0,.12); color:var(--gold);
  border:1px solid rgba(255,215,0,.2);
}

.categories { width:100%; display:flex; flex-direction:column; gap:12px; }
.cat-item { display:flex; flex-direction:column; gap:6px; }
.cat-header { display:flex; justify-content:space-between; font-size:13px; }
.cat-header .cat-name { color:var(--sub); }
.cat-header .cat-score { font-weight:700; }
.cat-bar-bg { height:6px; border-radius:3px; background:rgba(255,255,255,.08); overflow:hidden; }
.cat-bar-fill { height:100%; border-radius:3px; transition:width 1s ease .3s; }
.cat-bar-fill.c1 { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.cat-bar-fill.c2 { background: linear-gradient(90deg, var(--accent3), #67e8f9); }
.cat-bar-fill.c3 { background: linear-gradient(90deg, #fbbf24, #f97316); }
.cat-bar-fill.c4 { background: linear-gradient(90deg, #a78bfa, #818cf8); }

.summary-card {
  background:var(--card); border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.08); padding:20px;
  width:100%; text-align:center;
}
.summary-card .summary-icon { font-size:40px; margin-bottom:10px; }
.summary-card h3 { font-size:18px; font-weight:700; margin-bottom:8px; }
.summary-card p { font-size:14px; color:var(--sub); line-height:1.7; }

/* confetti */
.confetti-container { position:fixed; inset:0; pointer-events:none; z-index:10; overflow:hidden; }
.confetti-piece {
  position:absolute; top:-10px; width:10px; height:10px; border-radius:2px;
  animation: confetti-fall var(--cd) linear forwards;
  animation-delay: var(--cdelay);
}

/* toast */
.toast {
  position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
  padding:12px 28px; border-radius:50px; background:rgba(0,0,0,.85);
  color:#fff; font-size:14px; z-index:100; animation:slideUp .3s ease;
  pointer-events:none;
}

.qr-wrapper{background:#fff;padding:12px;border-radius:16px;display:inline-block;}.qr-wrapper canvas{display:block;}.qr-hint{font-size:12px;color:var(--sub);margin-top:8px;}

/* responsive */
@media (max-width:380px) {
  .welcome h1 { font-size:26px; }
  .score-circle { width:150px; height:150px; }
  .score-circle svg { width:150px; height:150px; }
  .score-text .percent { font-size:40px; }
}
</style>
</head>
<body>

<div class="bg-stars"></div>
<div class="stars" id="stars"></div>

<div class="container" id="app">
  <!-- Screen: Welcome -->
  <div class="screen welcome active" id="screen-welcome">
    <div class="floating-hearts">
      <span class="float-heart" style="top:10%;left:10%;--fd:3s;--fdelay:0s;">💕</span>
      <span class="float-heart" style="top:20%;right:15%;--fd:4s;--fdelay:1s;">💖</span>
      <span class="float-heart" style="top:40%;left:5%;--fd:3.5s;--fdelay:0.5s;">✨</span>
      <span class="float-heart" style="bottom:30%;right:10%;--fd:4.5s;--fdelay:1.5s;">💗</span>
      <span class="float-heart" style="bottom:15%;left:20%;--fd:3.2s;--fdelay:0.8s;">🌟</span>
    </div>
    <div class="icon">🔮</div>
    <h1>灵魂契合度测试</h1>
    <p>回答 12 道题，生成专属链接发给 Ta，看看你们的默契指数有多高 ✨</p>
    <button class="btn btn-primary" onclick="startQuiz()">
      <span>开始测试</span><span class="btn-icon">→</span>
    </button>
  </div>

  <!-- Screen: Quiz (Person A) -->
  <div class="screen" id="screen-quiz-a">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="quiz-header">
      <div class="q-num" id="q-num"></div>
    </div>
    <div id="name-section-a" class="card" style="text-align:center;">
      <h2>先告诉我，你的名字是？</h2>
      <div class="input-group" style="margin-top:16px;">
        <input type="text" id="name-a" placeholder="输入你的昵称" maxlength="12" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="confirmNameA()" style="margin-top:8px;">确定</button>
    </div>
    <div id="quiz-section-a" style="display:none;flex:1;display:none;flex-direction:column;">
      <h2 id="question-text" style="font-size:20px;font-weight:700;text-align:center;margin-bottom:24px;"></h2>
      <div id="options-container"></div>
      <div style="margin-top:auto;display:flex;gap:10px;padding-top:20px;">
        <button class="btn btn-secondary btn-sm" id="btn-prev" style="display:none;" onclick="prevQuestion()">← 上一题</button>
        <button class="btn btn-primary btn-sm" id="btn-next" onclick="nextQuestion()" style="flex:1;">下一题 →</button>
      </div>
    </div>
  </div>

  <!-- Screen: Share Link (after Person A finishes) -->
  <div class="screen share-screen" id="screen-share">
    <div class="share-icon">📨</div>
    <h2>你的答案已锁定！</h2>
    <p>复制下方链接发给你的好友，<br>Ta 点击后就能参与测试啦～</p>
    <div class="share-link-box" id="share-link"></div>
    <div id="qr-container"></div>
      <button class="btn btn-primary" onclick="copyShareLink()">📋 复制链接，转发给 Ta</button>
    <button class="btn btn-secondary" onclick="resetAll()">🔄 重新测试</button>
  </div>

  <!-- Screen: Quiz (Person B, loaded from link) -->
  <div class="screen" id="screen-quiz-b">
    <div class="card" style="text-align:center;margin-bottom:20px;">
      <p style="color:var(--accent);font-weight:600;">💌 <span id="person-a-name"></span> 向你发起了灵魂契合度测试</p>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill-b" style="width:0%"></div></div>
    <div id="name-section-b" class="card" style="text-align:center;">
      <h2>你的名字是？</h2>
      <div class="input-group" style="margin-top:16px;">
        <input type="text" id="name-b" placeholder="输入你的昵称" maxlength="12" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="confirmNameB()" style="margin-top:8px;">确定</button>
    </div>
    <div id="quiz-section-b" style="display:none;flex:1;flex-direction:column;">
      <h2 id="question-text-b" style="font-size:20px;font-weight:700;text-align:center;margin-bottom:24px;"></h2>
      <div id="options-container-b"></div>
      <div style="margin-top:auto;display:flex;gap:10px;padding-top:20px;">
        <button class="btn btn-secondary btn-sm" id="btn-prev-b" style="display:none;" onclick="prevQuestionB()">← 上一题</button>
        <button class="btn btn-primary btn-sm" id="btn-next-b" onclick="nextQuestionB()" style="flex:1;">下一题 →</button>
      </div>
    </div>
  </div>

  <!-- Screen: Results -->
  <div class="screen results-screen" id="screen-results">
    <div class="result-header">
      <div class="match-names"><span id="r-name-a"></span> × <span id="r-name-b"></span></div>
    </div>
    <div class="score-circle">
      <svg viewBox="0 0 200 200">
        <defs>
          <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff6b9d"/>
            <stop offset="100%" stop-color="#c44dff"/>
          </linearGradient>
        </defs>
        <circle class="bg-ring" cx="100" cy="100" r="90"/>
        <circle class="fg-ring" id="score-ring" cx="100" cy="100" r="90" style="--score-offset:565"/>
      </svg>
      <div class="score-text">
        <div class="percent" id="score-percent">--%</div>
        <div class="label">灵魂契合度</div>
      </div>
    </div>
    <div class="result-badge" id="result-badge"></div>
    <div class="categories" id="categories"></div>
    <div class="summary-card" id="summary-card"></div>
    <button class="btn btn-primary" onclick="resetAll()" style="margin-top:8px;">🔄 重新测试</button>
    <button class="btn btn-secondary btn-sm" onclick="shareResult()">📤 分享结果</button>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
// Questions
const questions = [
  { text: '周末的理想度过方式？', options: [
    { icon:'🏠', text:'宅家追剧/打游戏' },
    { icon:'🎉', text:'约朋友聚会聊天' },
    { icon:'🏕️', text:'户外运动/旅行' },
    { icon:'📚', text:'学习充电/搞副业' }
  ]},
  { text: '你更喜欢的食物类型？', options: [
    { icon:'🍜', text:'中餐家常菜' },
    { icon:'🍲', text:'火锅烧烤大排档' },
    { icon:'🍣', text:'日料西餐精致款' },
    { icon:'🍔', text:'什么都爱，吃货本货' }
  ]},
  { text: '遇到分歧时你会？', options: [
    { icon:'💬', text:'直接说出来，解决问题' },
    { icon:'🧊', text:'先冷静一下，再说' },
    { icon:'🤝', text:'尽量迁就对方' },
    { icon:'👀', text:'需要对方先开口' }
  ]},
  { text: '对于"仪式感"，你怎么看？', options: [
    { icon:'🎂', text:'很重要，生活需要仪式感' },
    { icon:'🌸', text:'偶尔来一下挺好的' },
    { icon:'👌', text:'不太在意，实在就好' },
    { icon:'🤷', text:'太麻烦了，顺其自然' }
  ]},
  { text: '旅行风格？', options: [
    { icon:'🗺️', text:'提前做详细攻略' },
    { icon:'🧭', text:'定个大方向，随走随停' },
    { icon:'🎒', text:'说走就走，完全随性' },
    { icon:'🏨', text:'躺酒店度假最舒服' }
  ]},
  { text: '对未来的态度？', options: [
    { icon:'📋', text:'有明确规划，按步骤来' },
    { icon:'🎯', text:'有大方向，灵活调整' },
    { icon:'🚶', text:'走一步看一步' },
    { icon:'🌈', text:'享受当下，未来随缘' }
  ]},
  { text: '你的社交性格？', options: [

    { icon:'🐺', text:'小圈子深度交流' },
    { icon:'🐱', text:'慢热但熟了很疯' },
    { icon:'🦉', text:'享受独处，偶尔社交' }
  ]},
  { text: '消费观念？', options: [
    { icon:'💰', text:'精打细算，注重性价比' },
    { icon:'🎁', text:'该花就花，开心最重要' },
    { icon:'🛍️', text:'喜欢就买，及时行乐' },
    { icon:'🏦', text:'攒钱为大目标' }
  ]},
  { text: '感情中最重要的是？', options: [
    { icon:'🔐', text:'信任与忠诚' },
    { icon:'💛', text:'理解与包容' },
    { icon:'🤗', text:'陪伴与分享' },
    { icon:'📈', text:'成长与进步' }
  ]},
  { text: '收到惊喜礼物，你会？', options: [
    { icon:'🥳', text:'超开心，跳起来！' },
    { icon:'😊', text:'感动但不好意思' },
    { icon:'🫶', text:'表面平静，心里很暖' },
    { icon:'😅', text:'第一反应是"又乱花钱"' }
  ]},
  { text: '面对压力时？', options: [
    { icon:'🗣️', text:'找人倾诉' },
    { icon:'🧘', text:'自己消化' },
    { icon:'🎮', text:'运动/音乐/打游戏释放' },
    { icon:'🏃', text:'疯狂做事转移注意力' }
  ]},
  { text: '理想的恋爱状态？', options: [
    { icon:'💞', text:'形影不离，时刻联系' },
    { icon:'🕊️', text:'各有空间，但心在一起' },
    { icon:'🚀', text:'互相成就，一起成长' },
    { icon:'🏠', text:'舒服自在，像最好的朋友' }
  ]}
];

// Category mapping
const catMap = {
  life: [0,1,4],      // Q1,Q2,Q5: 生活默契
  emotion: [2,3,8,9], // Q3,Q4,Q9,Q10: 情感共鸣
  values: [5,7],      // Q6,Q8: 价值观
  personality: [6,10,11] // Q7,Q11,Q12: 性格契合
};
const catNames = { life:'生活默契', emotion:'情感共鸣', values:'价值观契合', personality:'性格契合' };
const catColors = { life:'c1', emotion:'c2', values:'c3', personality:'c4' };

// State
let mode = 'a'; // 'a' | 'b'
let nameA = '', nameB = '';
let answersA = [], answersB = [];
let currentQ = 0;

// ═══ URL-safe base64 ═══
function base64urlEncode(str) {
  return btoa(unescape(encodeURIComponent(str)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
}
function base64urlDecode(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4) str += '=';
  return decodeURIComponent(escape(atob(str)));
}

function encodeData(name, answers) {
  return base64urlEncode(JSON.stringify({ n: name, a: answers }));
}
function decodeData(str) {
  try {
    var data = JSON.parse(base64urlDecode(str));
    if (data.n && data.a && data.a.length === 12) return data;
  } catch(e) {}
  return null;
}

// Init
function init() {
  createStars();
  var qp = new URLSearchParams(window.location.search);
  var raw = qp.get('d') || '';
  if (!raw) raw = window.location.hash.slice(1);
  if (raw) {
    var data = decodeData(raw);
    if (data) {
      nameA = data.n;
      answersA = data.a;
      mode = 'b';
    }
  }
  if (mode === 'b') {
    document.getElementById('person-a-name').textContent = nameA;
    switchScreen('screen-quiz-b');
    answersB = new Array(12).fill(-1);
    renderQuestionB(0);
  }
}
function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s`;
    container.appendChild(s);
  }
}
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}



// Person A flow
function startQuiz() {
  mode = 'a';
  answersA = new Array(12).fill(-1);
  currentQ = 0;
  switchScreen('screen-quiz-a');
  document.getElementById('name-section-a').style.display = 'block';
  document.getElementById('quiz-section-a').style.display = 'none';
  document.getElementById('name-a').value = '';
  document.getElementById('name-a').focus();
}
function confirmNameA() {
  const name = document.getElementById('name-a').value.trim();
  if (!name) { document.getElementById('name-a').focus(); return; }
  nameA = name;
  document.getElementById('name-section-a').style.display = 'none';
  document.getElementById('quiz-section-a').style.display = 'flex';
  renderQuestion(0);
}
function renderQuestion(idx) {
  currentQ = idx;
  const q = questions[idx];
  document.getElementById('q-num').textContent = `第 ${idx+1} / 12 题`;
  document.getElementById('question-text').textContent = q.text;
  document.getElementById('progress-fill').style.width = ((idx)/12*100) + '%';
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answersA[idx] === i ? ' selected' : '');
    div.innerHTML = `<span class="opt-icon">${opt.icon}</span><span class="opt-text">${opt.text}</span><span class="opt-check">${answersA[idx]===i?'✓':''}</span>`;
    div.onclick = () => selectOption(idx, i);
    container.appendChild(div);
  });
  document.getElementById('btn-prev').style.display = idx > 0 ? 'inline-flex' : 'none';
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = idx === 11 ? '✨ 生成分享链接' : '下一题 →';
  btnNext.style.opacity = answersA[idx] >= 0 ? '1' : '0.4';
  btnNext.style.pointerEvents = answersA[idx] >= 0 ? 'auto' : 'none';
}
function selectOption(qIdx, optIdx) {
  answersA[qIdx] = optIdx;
  renderQuestion(qIdx);
  document.getElementById('btn-next').style.opacity = '1';
  document.getElementById('btn-next').style.pointerEvents = 'auto';
}
function nextQuestion() {
  if (answersA[currentQ] < 0) return;
  if (currentQ < 11) {
    renderQuestion(currentQ + 1);
  } else {
    finishQuizA();
  }
}
function prevQuestion() {
  if (currentQ > 0) renderQuestion(currentQ - 1);
}
function finishQuizA() {
  const encoded = encodeData(nameA, answersA);
  var link = location.origin + location.pathname + '?d=' + encoded;
  document.getElementById('share-link').textContent = link;
  switchScreen('screen-share');
  genQR(link);
}

function genQR(url) {
  var container = document.getElementById('qr-container');
  if (!container) return;
  container.innerHTML = '<div class="qr-wrapper"><canvas id="qr-canvas"></canvas></div><div class="qr-hint">📱 好友可以直接扫码参与</div>';
  var canvas = document.getElementById('qr-canvas');
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    var size = Math.min(200, window.innerWidth - 80);
    canvas.width = size; canvas.height = size;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
  };
  img.onerror = function() { container.innerHTML = ''; };
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(url);
}

// Person B flow
function confirmNameB() {
  const name = document.getElementById('name-b').value.trim();
  if (!name) { document.getElementById('name-b').focus(); return; }
  nameB = name;
  document.getElementById('name-section-b').style.display = 'none';
  const qs = document.getElementById('quiz-section-b');
  qs.style.display = 'flex';
  renderQuestionB(0);
}
function renderQuestionB(idx) {
  currentQ = idx;
  const q = questions[idx];
  document.getElementById('question-text-b').textContent = q.text;
  document.getElementById('progress-fill-b').style.width = ((idx)/12*100) + '%';
  const container = document.getElementById('options-container-b');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answersB[idx] === i ? ' selected' : '');
    div.innerHTML = `<span class="opt-icon">${opt.icon}</span><span class="opt-text">${opt.text}</span><span class="opt-check">${answersB[idx]===i?'✓':''}</span>`;
    div.onclick = () => selectOptionB(idx, i);
    container.appendChild(div);
  });
  document.getElementById('btn-prev-b').style.display = idx > 0 ? 'inline-flex' : 'none';
  const btnNext = document.getElementById('btn-next-b');
  btnNext.textContent = idx === 11 ? '🔮 查看契合度' : '下一题 →';
  btnNext.style.opacity = answersB[idx] >= 0 ? '1' : '0.4';
  btnNext.style.pointerEvents = answersB[idx] >= 0 ? 'auto' : 'none';
}
function selectOptionB(qIdx, optIdx) {
  answersB[qIdx] = optIdx;
  renderQuestionB(qIdx);
  document.getElementById('btn-next-b').style.opacity = '1';
  document.getElementById('btn-next-b').style.pointerEvents = 'auto';
}
function nextQuestionB() {
  if (answersB[currentQ] < 0) return;
  if (currentQ < 11) {
    renderQuestionB(currentQ + 1);
  } else {
    showResults();
  }
}
function prevQuestionB() {
  if (currentQ > 0) renderQuestionB(currentQ - 1);
}

// Results
function showResults() {
  mode = 'b';
  answersB = answersB.slice(0,12);
  switchScreen('screen-results');
  document.getElementById('r-name-a').textContent = nameA;
  document.getElementById('r-name-b').textContent = nameB;

  // Calculate scores
  const totalScore = calcTotalScore(answersA, answersB);
  const catScores = {};
  for (const [cat, indices] of Object.entries(catMap)) {
    catScores[cat] = calcCatScore(answersA, answersB, indices);
  }

  // Animate score ring
  setTimeout(() => {
    const ring = document.getElementById('score-ring');
    const circumference = 2 * Math.PI * 90; // ~565.49
    const offset = circumference - (totalScore / 100) * circumference;
    ring.style.setProperty('--score-offset', offset);
    ring.style.transition = 'stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1)';
    ring.style.strokeDashoffset = offset;
  }, 200);

  // Animate percentage counter
  animateCounter('score-percent', totalScore, 1500);

  // Badge
  const badge = getBadge(totalScore);
  document.getElementById('result-badge').innerHTML = badge.emoji + ' ' + badge.text;

  // Categories
  const catContainer = document.getElementById('categories');
  catContainer.innerHTML = '';
  for (const [cat, score] of Object.entries(catScores)) {
    const item = document.createElement('div');
    item.className = 'cat-item';
    item.innerHTML = `
      <div class="cat-header">
        <span class="cat-name">${catNames[cat]}</span>
        <span class="cat-score">${score}%</span>
      </div>
      <div class="cat-bar-bg">
        <div class="cat-bar-fill ${catColors[cat]}" style="--bar-w:${score}%;width:${score}%"></div>
      </div>`;
    catContainer.appendChild(item);
  }

  // Summary
  const summary = getSummary(totalScore, catScores);
  document.getElementById('summary-card').innerHTML = `
    <div class="summary-icon">${summary.emoji}</div>
    <h3>${summary.title}</h3>
    <p>${summary.text}</p>`;

  // Confetti for high scores
  if (totalScore >= 70) spawnConfetti(totalScore >= 90 ? 80 : 40);
}

function calcTotalScore(a1, a2) {
  let total = 0;
  for (let i = 0; i < 12; i++) {
    const dist = Math.abs(a1[i] - a2[i]);
    total += (3 - dist) / 3; // max 1 per question
  }
  return Math.round((total / 12) * 100);
}
function calcCatScore(a1, a2, indices) {
  let total = 0;
  for (const i of indices) {
    const dist = Math.abs(a1[i] - a2[i]);
    total += (3 - dist) / 3;
  }
  return Math.round((total / indices.length) * 100);
}
function animateCounter(id, target, duration) {
  const el = document.getElementById(id);
  let start = 0;
  const step = (ts) => {
    if (!start) start = ts;
    const progress = Math.min((ts - start) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.round(eased * target) + '%';
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = target + '%';
  };
  requestAnimationFrame(step);
}
function getBadge(score) {
  if (score >= 95) return { emoji:'💘', text:'天作之合' };
  if (score >= 85) return { emoji:'💖', text:'灵魂伴侣' };
  if (score >= 70) return { emoji:'💫', text:'心有灵犀' };
  if (score >= 55) return { emoji:'🌙', text:'默契十足' };
  if (score >= 40) return { emoji:'⚡', text:'互补吸引' };
  if (score >= 25) return { emoji:'🎭', text:'欢喜冤家' };
  return { emoji:'🌍', text:'不同星球' };
}
function getSummary(total, cats) {
  const high = Object.entries(cats).filter(([,s]) => s >= 75).map(([c]) => catNames[c]);
  const low = Object.entries(cats).filter(([,s]) => s < 40).map(([c]) => catNames[c]);

  if (total >= 90) return {
    emoji:'🌈', title:'命中注定的相遇',
    text:`你们的灵魂频率几乎完美共振！${high.length ? '尤其在' + high.join('、') + '方面，你们惊人的一致。' : ''}这样的契合度万里挑一，请好好珍惜彼此 ✨`
  };
  if (total >= 75) return {
    emoji:'💝', title:'灵魂深处的共鸣',
    text:`你们在${high.length ? high.join('、') + '上高度契合，' : '很多方面'}心有灵犀。${low.length ? '在' + low.join('、') + '上虽有差异，但正是这些不同让你们的关系更加立体。' : ''}很好的配对！`
  };
  if (total >= 60) return {
    emoji:'🌻', title:'温暖的默契',
    text:`你们之间的契合度相当不错！${high.length ? high.join('、') + '是你们的强项。' : ''}${low.length ? low.join('、') + '上可以多些理解与磨合，' : ''}相信时间会让你们越来越懂彼此 💛`
  };
  if (total >= 45) return {
    emoji:'🦋', title:'有趣的互补关系',
    text:`你们在很多方面各有各的节奏。${high.length ? high.join('、') + '是你们的连接点。' : ''}${low.length ? '在' + low.join('、') + '上你们差异较大，但差异也是一种吸引力——互相学习、彼此欣赏，关系会很有趣！' : ''}`
  };
  if (total >= 30) return {
    emoji:'🎢', title:'欢乐的碰撞',
    text:`你们的思维方式和生活习惯差异不小，但这未必是坏事。${high.length ? '好在' + high.join('、') + '上还有点共同语言。' : ''}欢喜冤家的组合往往充满惊喜和笑料，试试看吧 🤣`
  };
  return {
    emoji:'🪐', title:'来自不同星球',
    text:`你们在几乎所有的维度上都展现出了截然不同的选择。但这不代表你们不合适——有些最坚固的关系，恰恰建立在完全的差异之上。如果真的有心，一切都是可能的 🌟`
  };
}

// Confetti
function spawnConfetti(count) {
  const container = document.getElementById('confetti');
  const colors = ['#ff6b9d','#c44dff','#4da6ff','#ffd700','#4ade80','#f97316','#fbbf24','#a78bfa'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left:${Math.random()*100}%; background:${colors[Math.floor(Math.random()*colors.length)]};
      --cd:${2+Math.random()*3}s; --cdelay:${Math.random()*0.8}s;
      width:${6+Math.random()*8}px; height:${6+Math.random()*8}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
    `;
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

// Share
function copyShareLink() {
  var link = document.getElementById('share-link').textContent;
  if (navigator.share) {
    navigator.share({ title:'灵魂契合度测试', text: nameA + ' 邀请你做灵魂契合度测试！', url: link }).catch(function() { fallbackCopy(link); });
    return;
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(link).then(function() { toast('✅ 已复制，去微信粘贴给 Ta！'); }).catch(function() { fallbackCopy(link); });
    return;
  }
  fallbackCopy(link);
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px'; ta.style.top = '0';
  ta.style.opacity = '0'; document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    var ok = document.execCommand('copy');
    toast(ok ? '✅ 已复制，去微信粘贴给 Ta！' : '⚠️ 复制失败，请长按上方链接手动复制');
  } catch(e) { toast('⚠️ 请长按上方链接手动复制'); }
  document.body.removeChild(ta);
}
function shareResult() {
  const score = document.getElementById('score-percent').textContent;
  const badge = document.getElementById('result-badge').textContent;
  const text = `🔮 ${nameA} 和 ${nameB} 的灵魂契合度：${score} ${badge}`;
  if (navigator.share) {
    navigator.share({ title:'灵魂契合度测试结果', text: text }).catch(function(){});
  } else {
    var ta2 = document.createElement('textarea');
    ta2.value = text; ta2.style.position = 'fixed'; ta2.style.left = '-9999px';
    document.body.appendChild(ta2); ta2.select();
    var ok2 = document.execCommand('copy');
    document.body.removeChild(ta2);
    toast(ok2 ? '📋 结果已复制，去分享吧！' : '复制失败');
  }
}
function resetAll() {
  nameA = ''; nameB = '';
  answersA = []; answersB = [];
  currentQ = 0;
  mode = 'a';
  history.replaceState(null, '', location.pathname);
  switchScreen('screen-welcome');
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 2000);
}

// Init
init();
</script>
